version: 1
name: ${PROJECTDIR}
domain: ${PROJECTNAME}.${SCDEV_DOMAIN}
auto_open_at_start: true

shared:
  router: true

services:
  app:
    image: node:22
    command: sh -c "corepack enable && while [ ! -f /app/package.json ]; do sleep 1; done && pnpm install && pnpm drizzle-kit push && pnpm dev --host 0.0.0.0 --port 3000"
    working_dir: /app
    volumes:
      - ${PROJECTPATH}:/app
      - node_modules:/app/node_modules
      - data:/app/data
    environment:
      NODE_ENV: development
      NUXT_HOST: "0.0.0.0"
      NUXT_PORT: "3000"
    routing:
      protocol: http
      port: 3000

volumes:
  node_modules:

mutagen:
  ignore:
    - .nuxt
    - .output
    - node_modules