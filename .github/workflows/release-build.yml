name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.4.0)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

  build-docker:
    needs: [ci]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/scalecommerce-dev/completo:${{ steps.version.outputs.version }}
            ghcr.io/scalecommerce-dev/completo:latest
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-cli:
    needs: [ci]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-s -w -X github.com/scalecommerce-dev/completo/cli/cmd.Version=${VERSION} -X github.com/scalecommerce-dev/completo/cli/cmd.BuildTime=${BUILD_TIME}"
          go build -ldflags "${LDFLAGS}" -o ../completo-${{ matrix.suffix }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: completo-${{ matrix.suffix }}
          path: completo-${{ matrix.suffix }}

  release:
    needs: [build-docker, build-cli]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: completo-*
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          # Extract the first version section from CHANGELOG.md
          VERSION=${GITHUB_REF_NAME}
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} /^## v/{if(found) exit} found" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${VERSION}"
          fi
          # Write to file for the release body
          cat > release-body.md << 'HEADER'
## Quick start

```bash
docker run -p 3000:3000 \
  -e NUXT_SESSION_PASSWORD=$(openssl rand -base64 32) \
  -v completo-data:/data \
  ghcr.io/scalecommerce-dev/completo:latest
```

Open `localhost:3000` — demo data included.

<details>
<summary>CLI for AI agents</summary>

**macOS / Linux:**
```bash
curl -fsSL https://raw.githubusercontent.com/scalecommerce-dev/completo/main/install.sh | sh
```

**Windows:** Download `completo-windows-amd64.exe` from the assets below.

</details>

---

HEADER
          printf '%s\n' "$NOTES" >> release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: dist/completo-*
